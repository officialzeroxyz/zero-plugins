name: Release Gemini/Qwen extension

# Auto-publishes a GitHub Release for the Gemini/Qwen extension archive, version-driven by the manifest.
# On a push to main, it reads the version from plugins/zero-gemini/gemini-extension.json; if
# no release exists for that version yet, it assembles the extension and publishes a release
# (creating the tag, attaching the single asset, marking it Latest). The archive contains both
# gemini-extension.json and qwen-extension.json at its root, so both hosts can install with the
# plain repo URL:
#
#     gemini extensions install https://github.com/<owner>/zero-plugins
#     qwen extensions install https://github.com/<owner>/zero-plugins
#
# To ship a change: bump "version" in plugins/zero-gemini/gemini-extension.json and merge to
# main. A push that doesn't change the version finds the release already exists and no-ops —
# so content changes (skill, hook scripts) only ship once you bump the version.
#
# Asset invariants (do not break — see scripts/build-gemini.sh and github.ts in gemini-cli):
# exactly ONE asset, name ends `.tar.gz` with no darwin/linux/win32 substring, and
# gemini-extension.json and qwen-extension.json sit at the archive root. A pure-text extension
# needs only this one generic .tar.gz; Gemini/Qwen extract it in-process on every OS.

on:
  push:
    branches: [main]
    paths:
      - "plugins/zero-gemini/**"
      - "plugins/zero-qwen/**"
      - "plugins/zero/skills/**"
      - "plugins/zero/hooks/ensure-runner.sh"
      - "plugins/zero/hooks/zero-context.sh"
      - "plugins/zero/hooks/auto-approve-zero.sh"
      - "scripts/build-gemini.sh"
      - ".github/workflows/release-gemini.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read manifest version
        id: ver
        run: |
          version="$(jq -r .version plugins/zero-gemini/gemini-extension.json)"
          [ -n "$version" ] && [ "$version" != "null" ] || { echo "no version in manifest" >&2; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if the release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.tag }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the extension asset
        if: steps.check.outputs.exists == 'false'
        run: ./scripts/build-gemini.sh --tar zero-gemini.tar.gz

      - name: Create and publish the release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" zero-gemini.tar.gz \
            --target "${{ github.sha }}" \
            --title "Zero for Gemini CLI and Qwen Code ${{ steps.ver.outputs.tag }}" \
            --latest \
            --notes $'Install with: `gemini extensions install https://github.com/${{ github.repository }}`\n\nOr: `qwen extensions install https://github.com/${{ github.repository }}`'
