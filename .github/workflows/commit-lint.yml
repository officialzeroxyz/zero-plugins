name: Commit lint

# Enforces the commit-message rule from CONTRIBUTING.md / AGENTS.md: the PR title
# must follow Conventional Commits — type(scope)?: description.
#
# PRs are squash-merged, so the PR title becomes the commit that lands on main —
# that's the one string worth validating. Uses the standard
# amannn/action-semantic-pull-request (pinned to a commit SHA).

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in lockstep with the allowed types in CONTRIBUTING.md / AGENTS.md.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
