name: Commit lint

# Enforces the commit-message rule from CONTRIBUTING.md / AGENTS.md: every commit
# and the PR title must follow Conventional Commits — type(scope)?: description.
#
# Because PRs are squash-merged, the PR title becomes the commit that lands on
# main, so it is validated alongside the individual commits in the PR.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages and PR title
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          # Conventional Commits subject: type(scope)?!?: description
          #   type   — one of the allowed set below
          #   scope  — optional, any non-")" chars in parentheses
          #   !      — optional breaking-change marker
          #   desc   — required, non-empty
          types='feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert'
          pattern="^(${types})(\([^)]+\))?!?: .+"

          fail=0
          check() {
            local subject="$1" label="$2"
            # Ignore merge commits — they aren't authored subjects.
            case "$subject" in
              "Merge "*) echo "  skip (merge): $subject"; return 0 ;;
            esac
            if printf '%s' "$subject" | grep -qE "$pattern"; then
              echo "  ok:   $subject"
            else
              echo "::error::${label} does not follow Conventional Commits: \"$subject\""
              fail=1
            fi
          }

          git fetch --quiet origin "$BASE_REF"
          base="origin/$BASE_REF"

          echo "Commits in this PR:"
          # First line (subject) of each commit unique to this PR.
          while IFS= read -r sha; do
            [ -n "$sha" ] || continue
            check "$(git log -1 --format=%s "$sha")" "commit $sha"
          done < <(git rev-list "$base..HEAD")

          if [ -n "${PR_TITLE:-}" ]; then
            echo "PR title:"
            check "$PR_TITLE" "PR title"
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::Use 'type(scope)?: description' — see CONTRIBUTING.md. Allowed types: ${types//|/, }."
            exit 1
          fi
          echo "All commit messages and the PR title follow Conventional Commits."
